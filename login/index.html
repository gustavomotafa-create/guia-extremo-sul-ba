<!doctype html>
<html lang="pt-BR">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Login | Girassol Vagas</title>
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800;900&family=Pacifico&display=swap" rel="stylesheet" />
    <link rel="stylesheet" href="../styles.css" />
  </head>
  <body>
    <header class="site-header">
      <div class="header-shell">
        <a class="brand" href="../index.html" aria-label="Girassol Vagas">
          <span class="brand-icon"><img src="../assets/sunflower-logo.svg" alt="" /></span>
          <span><strong>Girassol</strong><small>Vagas</small></span>
        </a>
        <nav class="main-nav" aria-label="Navegação principal">
          <a href="../index.html">Início</a>
          <a href="../index.html#vagas">Vagas</a>
          <a href="../sobre/">Como Funciona</a>
          <a href="../precos/">Preços</a>
        </nav>
        <div class="header-actions">
          <a class="primary-button header-button" href="../publicar-vaga/">+ Publicar Vaga</a>
          <a class="secondary-button header-login" href="../login/" data-auth-link data-login-url="../login/" data-account-url="../minhas-vagas-salvas/" data-company-url="../empresa/" data-admin-url="../admin/vagas/">Entrar</a>
        </div>
      </div>
    </header>

    <main class="page-shell">
      <section class="page-hero">
        <div>
          <h1>Entrar no Girassol</h1>
          <p>Acesse sua conta para salvar vagas, publicar oportunidades ou administrar o portal.</p>
        </div>
      </section>

      <section class="auth-card">
        <div class="auth-tabs" role="tablist" aria-label="Entrar ou criar conta">
          <button class="is-active" id="loginTab" type="button" data-auth-tab="login">Entrar</button>
          <button id="signupTab" type="button" data-auth-tab="signup">Criar conta</button>
        </div>

        <form class="form-card auth-form" id="loginForm">
          <label class="form-field full-row">
            E-mail
            <input id="loginEmail" type="email" autocomplete="email" placeholder="seuemail@exemplo.com" required />
          </label>
          <label class="form-field full-row">
            Senha
            <input id="loginPassword" type="password" autocomplete="current-password" placeholder="Sua senha" required />
          </label>
          <div class="form-actions">
            <button class="primary-button" id="signInButton" type="submit">Entrar</button>
            <button class="outline-button" id="googleLoginButton" type="button">Entrar com Google</button>
          </div>
        </form>

        <form class="form-card auth-form" id="signupForm" hidden>
          <label class="form-field full-row">
            Tipo de conta
            <select id="roleSelect">
              <option value="candidate">Candidato</option>
              <option value="company">Empresa</option>
            </select>
          </label>
          <label class="form-field">
            Nome
            <input id="nameInput" type="text" placeholder="Seu nome ou nome da empresa" />
          </label>
          <label class="form-field">
            E-mail
            <input id="signupEmail" type="email" autocomplete="email" placeholder="seuemail@exemplo.com" required />
          </label>
          <label class="form-field">
            Senha
            <input id="signupPassword" type="password" autocomplete="new-password" placeholder="Mínimo de 6 caracteres" required />
          </label>
          <div class="form-actions">
            <button class="primary-button" id="signUpButton" type="submit">Criar conta</button>
            <button class="outline-button" id="googleSignupButton" type="button">Criar com Google</button>
          </div>
        </form>

        <div class="success-card is-visible" id="authMessage">
          <strong>Login pronto</strong>
          <p>Entre com e-mail e senha ou use sua conta Google.</p>
        </div>
      </section>
    </main>

    <script src="../js/firebase-config.js"></script>
    <script src="../js/firebase-config.local.js"></script>
    <script src="../js/header-auth.js"></script>
    <script src="./login.js"></script>
  </body>
</html>
